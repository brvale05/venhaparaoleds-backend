name: Java CI with Maven and PostgreSQL

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Cria um container do PostgreSQL exclusivamente para rodar os testes
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: desafio_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Faz cache das dependências do Maven para acelerar a pipeline

    - name: Dar permissão de execução ao Maven Wrapper
      run: chmod +x mvnw

    - name: Rodar os testes e compilar
      run: ./mvnw clean verify
      env:
        # Passa as variáveis para a aplicação se conectar ao PostgreSQL do GitHub Actions
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/desafio_db
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: password
